name: Release And Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-and-publish:
    name: Release to npm
    runs-on: ubuntu-slim
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Read package version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [ -z "$VERSION" ]; then
            echo "package.json is missing a non-empty version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Determine npm tag based on version (prerelease vs stable)
          if echo "$VERSION" | grep -Eq '\-(alpha|beta|rc|pre|preview|dev|next)'; then
            echo "tag=prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if tag exists
        id: tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${VERSION} already exists. Nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${VERSION} does not exist. Creating release and publishing package."
          fi

      - name: Create tag and release
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "Release $VERSION"

      - name: Publish to npm
        id: publish
        if: steps.tag.outputs.exists == 'false'
        continue-on-error: true
        run: npm publish --provenance --access public --tag ${{ steps.version.outputs.tag }}

      - name: Roll back release and tag on publish failure
        if: steps.tag.outputs.exists == 'false' && steps.publish.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release delete "$VERSION" --cleanup-tag --yes
          echo "npm publish failed; rolled back release and tag ${VERSION}."
          exit 1
